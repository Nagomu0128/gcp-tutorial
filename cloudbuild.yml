steps:
  # 1. Docker イメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'asia-northeast2-docker.pkg.dev/$PROJECT_ID/gcp-tutorial/my-image:$SHORT_SHA', 
      '.'
    ]

  # 2. Artifact Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'asia-northeast2-docker.pkg.dev/$PROJECT_ID/gcp-tutorial/my-image:$SHORT_SHA'
    ]

  # 3. Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gcp-tutorial-service' # Cloud Run上での表示名（任意）
      - '--image'
      - 'asia-northeast2-docker.pkg.dev/$PROJECT_ID/gcp-tutorial/my-image:$SHORT_SHA'
      - '--region'
      - 'asia-northeast2' # ここも大阪に合わせる
      - '--allow-unauthenticated'

images:
  - 'asia-northeast2-docker.pkg.dev/$PROJECT_ID/gcp-tutorial/my-image:$SHORT_SHA'