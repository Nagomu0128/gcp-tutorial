substitutions:
  _REGION: asia-northeast2
  _SERVICE: gcp-tutorial-service

steps:
  # 1. Docker イメージをビルド
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/gcp-tutorial/my-image:${SHORT_SHA}
      - .

  # 2. Artifact Registry にプッシュ
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/gcp-tutorial/my-image:${SHORT_SHA}

  # 3. Cloud Run にデプロイ
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/gcp-tutorial/my-image:${SHORT_SHA}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/gcp-tutorial/my-image:${SHORT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
